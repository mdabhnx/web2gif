version: '3.8'

services:
  web2gif:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/prod.db
      - NODE_ENV=production
    volumes:
      - ./prisma:/app/prisma
      - ./public/outputs:/app/public/outputs
    restart: always

